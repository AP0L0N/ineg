    settings:
      description: 'Inštitut nizkoenergijske gradnje je edini tovrstni inštitut v Sloveniji, ki poleg razvojnega oddelka izvaja tudi gradnjo vseh vrst nizkoenergijskih skeletnih hiš ter izdeluje in izvaja montažo lesenih konstrukcij: teras, ograj, fasadnih sistemov, vrtnih hišk, nadstreškov in izdelkov po želji strank. Smo edino podjetje v Sloveniji, ki z ekipo strokovnjakov in izkušenih monterjev z dolgoletnimi izkušnjami pri izolacijo hiš in drugih objekotv uporabljamo in prodajamo certificirano vpihano slamo, ki je med najboljšimi naravnimi izolativnimi materiali. Smo inovativni, v koraku s časom, učinkoviti, spretni in zanesljivi.'
